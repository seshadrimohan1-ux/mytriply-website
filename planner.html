<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trip Planner</title>

    <link rel="stylesheet" href="planner.css">
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<header>

    <h1><a href="index.html">Triply</a></h1>
    <p>Trips, Without the Hassle</p>

</header>

<section class="mapSection">

    <h2>Select a Destination</h2>

    <div id="map"></div>

    <div class="coordinates">

        <label>

            Latitude

            <input type="text" id="latitude" readonly>

        </label>

        <label>

            Longitude

            <input type="text" id="longitude" readonly>

        </label>

    </div>

</section>

<div class="selectedLocation">

    <h3>Selected Location</h3>

    <p id="locationDisplay">None Selected</p>

</div>
<!-- Questions -->

<section class="questions">

<div class="questionBox">

<div class="column">

<label><input type="checkbox"> Beach</label>

<label><input type="checkbox"> Mountains</label>

<label><input type="checkbox"> Hiking</label>

<label><input type="checkbox"> Cities</label>

</div>

<div class="column">

<label><input type="checkbox"> Camping</label>

<label><input type="checkbox"> Museums</label>

<label><input type="checkbox"> Amusement Parks</label>

<label><input type="checkbox"> Nightlife</label>

</div>

</div>

</section>


<!-- Text Box -->

<section class="notes">

<textarea placeholder="Insert text..."></textarea>

<p class="instructions">

Instructions

</p>

</section>


<!-- Result -->

<section class="results">

<button id="tripButton">

See your Trip!

</button>



</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="planner.js"></script>

</body>

</html>
